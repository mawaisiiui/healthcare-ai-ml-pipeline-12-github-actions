name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx "dvc[s3]" awscli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Debug AWS access
        run: |
          echo "AWS_REGION=$AWS_REGION"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
          aws configure list
          aws sts get-caller-identity
          aws s3 ls s3://amzn-s3-healthcare
          aws s3 ls s3://amzn-s3-healthcare/dvc-store/ --recursive | head

      - name: Pull DVC artifacts
        run: |
          dvc pull -v

      - name: Run API tests
        run: |
          python -m pytest tests/test_routes.py -v

      - name: Run feature schema tests
        run: |
          python -m pytest tests/test_schema.py -v

      - name: Run model artifact tests
        run: |
          python -m pytest tests/test_artifacts.py -v